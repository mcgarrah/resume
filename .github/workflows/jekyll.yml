name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.300.0
        with:
          ruby-version: '3.2.6'
          bundler-cache: true
          cache-version: 1
      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-latex-extra
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Jekyll Doctor
        run: bundle exec jekyll doctor
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Verify exports
        run: |
          echo "Checking for generated exports..."
          ls -la _site/downloads/ || echo "No downloads directory"
          if [ -f "_site/downloads/McGarrah-Resume.pdf" ]; then
            echo "✓ McGarrah-Resume.pdf generated"
          elif [ -f "_site/downloads/print.pdf" ]; then
            echo "⚠ Fallback: print.pdf found (rename not applied)"
          else
            echo "✗ No PDF export found"
          fi
      - name: HTML Proofer
        run: |
          bundle exec htmlproofer _site \
            --ignore-urls "/fonts.googleapis.com/,/fonts.gstatic.com/" \
            --ignore-status-codes "999,403" \
            --no-enforce-https \
            --ignore-missing-alt \
            --allow-missing-href \
            --disable-external || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5