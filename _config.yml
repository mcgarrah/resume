#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: Michael McGarrah — Resume
url: 'https://mcgarrah.org'
baseurl: "/resume"

# Canonical URL configuration for SEO
canonical_url: "https://mcgarrah.org/resume"

description: "Engineering Leader bridging enterprise architecture, AI/ML, and cloud platforms with 30+ years in technology leadership, security, and hands-on engineering."
# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-pandoc-exports

# Pandoc Exports - automatic PDF and DOCX generation
pandoc_exports:
  enabled: true
  output_dir: 'downloads'
  collections: ['pages']
  incremental: true
  unicode_cleanup: true
  inject_downloads: false
  pdf_options:
    variable: 'geometry:margin=0.75in'
  image_path_fixes:
    - pattern: 'src="/resume/assets/'
      replacement: 'src="{{site.dest}}/assets/'
  title_cleanup:
    - '<title>[^<]*</title>'
    - '<div class="sidebar-wrapper">.*?</div><!--//sidebar-wrapper-->'
    - '<img class="avatar"[^>]*/?>'
    - '<li class="phone"><i class="fas fa-passport">.*?</li>'
    - '<li class="timezone"[^>]*>.*?</li>'
    - '<li class="website"[^>]*>.*?</li>'
    - '<li class="linkedin"[^>]*>.*?</li>'
    - '<li class="github"[^>]*>.*?</li>'
    - '<li class="gitlab"[^>]*>.*?</li>'
    - '<li class="discord"[^>]*>.*?</li>'
    - '<li class="stack-overflow"[^>]*>.*?</li>'
    - '<li class="pdf"[^>]*>.*?</li>'
    - '<li class="docx"[^>]*>.*?</li>'
    - '<li class="print"[^>]*>.*?</li>'
    - '<div class="languages-container[^"]*"[^>]*>.*?</div>'
    - '<span class="fa-stack[^"]*">.*?</span>'
  template:
    css: >
      .wrapper { display: block; padding: 0; margin: 0; }
      .sidebar-wrapper { display: block; padding: 0; }
      .main-wrapper { display: block; padding: 0; }
      .section { margin-bottom: 10px; }
      .section-title { font-size: 24px; font-weight: bold; text-transform: uppercase;
        border-bottom: 2px solid #333; padding-bottom: 4px; margin-bottom: 10px; }
      .skillset { column-count: 2; column-gap: 20px; }
      .skillset .item { margin-bottom: 6px; break-inside: avoid; }
      .skillset .category-title { font-size: 10pt; margin-bottom: 2px; }
      .skillset .list { font-size: 8.5pt; line-height: 1.3; }

encoding: "utf-8"

# Development Settings
port: 4000
#host: 0.0.0.0
host: 127.0.0.1
safe: false
