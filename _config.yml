#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: Michael McGarrah — Resume
url: 'https://mcgarrah.org'
baseurl: "/resume"

# Canonical URL configuration for SEO
canonical_url: "https://mcgarrah.org/resume"

description: "Engineering Leader bridging enterprise architecture, AI/ML, and cloud platforms with 30+ years in technology leadership, security, and hands-on engineering."
# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-pandoc-exports

# Pandoc Exports - automatic PDF and DOCX generation
pandoc_exports:
  enabled: true
  output_dir: 'downloads'
  collections: ['pages']
  incremental: true
  unicode_cleanup: true
  inject_downloads: false
  pdf_options:
    variable: 'geometry:margin=0.75in'
  image_path_fixes:
    - pattern: 'src="/resume/assets/'
      replacement: 'src="{{site.dest}}/assets/'
  title_cleanup: []
  template:
    css: >
      body { font-size: 11pt; line-height: 1.5; }
      .print-resume { padding: 0; margin: 0; }
      .print-header { border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 16px; }
      .print-header__name { font-size: 22pt; font-weight: 900; margin: 0 0 2px 0; }
      .print-header__tagline { font-size: 11pt; color: #555; margin: 0 0 8px 0; }
      .print-header__contact { list-style: none; padding: 0; margin: 0;
        display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 9pt; }
      .print-header__contact a { color: #333; text-decoration: none; }
      .section { margin-bottom: 14px; }
      .section-title { font-size: 13pt; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.03em; border-bottom: 2px solid #333;
        padding-bottom: 3px; margin-bottom: 10px; }
      .item { margin-bottom: 14px; padding-top: 8px; border-top: 1px solid #ddd; }
      .item:first-child { border-top: none; padding-top: 0; }
      .upper-row { display: flex; justify-content: space-between; align-items: baseline; }
      .job-title, .degree, .cert-title { font-size: 12pt; font-weight: 700; margin: 0; }
      .time { font-size: 9pt; font-weight: 600; color: #666; }
      .company, .university, .cert-org { font-size: 9.5pt; color: #555; margin-bottom: 4px; }
      .details { font-size: 9.5pt; line-height: 1.5; color: #444; }
      .details p { margin-bottom: 4px; }
      .details ul, .details ol { padding-left: 16px; margin-bottom: 4px; }
      .details li { margin-bottom: 2px; }
      .skillset { column-count: 2; column-gap: 20px; }
      .skillset .item { margin-bottom: 6px; break-inside: avoid; padding-top: 0; border-top: none; }
      .skillset .category-title { font-size: 10pt; font-weight: 700; margin-bottom: 2px; }
      .skillset .sub-category-title { font-size: 9pt; font-weight: 600; font-style: italic; margin: 2px 0 1px 10px; }
      .skillset .list { font-size: 8.5pt; line-height: 1.3; color: #555; margin-left: 10px; }
      .oss-section .item { margin-bottom: 4px; padding-top: 0; border-top: none; }
      .print-links-section { margin-top: 16px; border-top: 1px solid #ddd; padding-top: 8px; }
      .print-links-list { list-style: none; padding: 0; margin: 0;
        display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 9pt; }
      .print-links-list a { color: #333; text-decoration: none; }

encoding: "utf-8"

# Development Settings
port: 4000
#host: 0.0.0.0
host: 127.0.0.1
safe: false
