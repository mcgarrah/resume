career-profile:
    title: Career Profile
    summary: |
      Technology leader with 30+ years bridging enterprise architecture, AI/ML, and cloud
      platforms. Career spans engineering leadership (IT Director, Development Manager),
      enterprise architecture (statewide technology standards for North Carolina state
      government), and hands-on platform engineering (AWS, EKS, production ML models).
      Security and compliance depth includes passing IRS SafeGuard audits, leading SOC 1/SOC 2
      compliance across eight simultaneous audits, and serving on a Congressional subcommittee
      (ETAAC) reporting to Congress on technology and security policy. Currently completing an
      Executive MBA at UNC Wilmington, deliberately complementing technical depth with business
      strategy and organizational leadership.

education:
    title: Education
    info:
      - degree: Executive Masters of Business Administration
        university: University of North Carolina Wilmington
        time: 2025 - present
        gpa: 4.00
        summary: |
          Pursuing an Executive MBA with a focus on Corporate Entrepreneurship, deliberately
          complementing 30+ years of technical depth with business strategy, finance, and
          organizational leadership. Applying coursework directly to technology adoption
          decisions, ROI analysis for platform investments, and organizational change management
          for AI/ML initiatives. EMBA Candidate — Expected Graduation: Spring 2027
      - degree: Masters of Science in Computer Science
        university: Georgia Institute of Technology
        time: 2014 - 2019
        gpa: 3.63
        summary: |
          Completed a five-year graduate program while working full-time — a deliberate
          investment in AI/ML depth that required sustained discipline across evenings,
          weekends, and years of compressed personal time. Specialization in Interactive
          Intelligence with coursework spanning machine learning, perception systems,
          natural language processing, computer vision, and knowledge-based AI. A cross-domain
          research collaboration with a PhD candidate in sociolinguistics produced a
          peer-reviewed publication in the Nordic Journal of Linguistics (2021) and a
          conference presentation at NWAV 46 — demonstrating how applied CS and ML skills
          serve as a force multiplier for domain experts in other fields.
        details: |
          The most significant outcome was the research collaboration with Nathan J. Young,
          a PhD candidate in sociolinguistics. Young had built phonetic dictionaries for
          Swedish and Danish but lacked the software engineering capability to operationalize
          them. I generalized the FAVE forced alignment toolkit to handle non-English
          language features through a configuration-driven architecture, built the processing
          pipeline, and created a web interface for the research community. The result: a CS
          engineer publishing in a linguistics journal because the cross-domain bridge created
          research capability that neither discipline could achieve alone.

          This pattern — bringing engineering rigor and platform thinking to accelerate
          domain experts — is the same model that drives successful AI/ML organizations.
          Data scientists, researchers, and business analysts have domain knowledge; platform
          engineers build the infrastructure that makes that knowledge operational. The
          Georgia Tech research was an early proof point for a career spent bridging those
          disciplines.
            - [NWAV 46](https://en.wikipedia.org/wiki/New_Ways_of_Analyzing_Variation){:target="_blank"} [Conference Presentation](https://dept.english.wisc.edu/nwav46/?page_id=57){:target="_blank"}
              "155. Introducing NordFA:Forced alignment of Nordic languages. Nathan J. Young & Michael McGarrah"
            - [Abstract: Forced alignment for Nordic languages: Rapidly constructing a high-quality prototype.](https://www.cambridge.org/core/journals/nordic-journal-of-linguistics/article/forced-alignment-for-nordic-languages-rapidly-constructing-a-highquality-prototype/FDE14A3666650127DB7D74E83EC09438){:target="_blank"} [(PDF)](https://github.com/mcgarrah/LG-FAVE/blob/7c592cf6c75b8c6feee08c0fe9b79b17dd699404/Young_McGarrah_2021.pdf){:target="_blank"}
            - [LG-FAVE Software Repository](https://github.com/mcgarrah/LG-FAVE){:target="_blank"}
