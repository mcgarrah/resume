experiences:
    title: Experiences
    info:
      - role: Lead Principal Engineer (Cloud & ML Focus)
        time: Oct 2021 - Present
        company: Envestnet, Inc., Emerald Isle NC (Remote)
        summary: |
          Leading cloud platform architecture across 20+ AWS accounts spanning every billing
          and data platform in the enterprise. Recovered a critical cross-enterprise data
          engineering project under pressure, then served as technical advisor to the engineering
          team on AWS data pipeline architecture — accelerating delivery by leveraging prior
          BCBSNC experience with similar patterns. Founded and led the cross-team EKS Working
          Group, driving Kubernetes architecture decisions and building an enterprise community
          of practice through influence rather than mandate. Built the observability framework
          (New Relic with Confluence-linked runbooks and Terraform-provisioned dashboards) that
          became a company-wide standard. Led SOC 1/SOC 2 compliance from a single inaugural
          audit to eight simultaneous audits across all products, automating evidence collection
          and serving as primary technical liaison to external auditors. Delivered the first
          AI/ML production workload on the Billing platform (AWS Bedrock Data Automation). Drove
          measurable cost optimization through EKS right-sizing, scale-to-zero workloads, and
          Karpenter migration.
            - <a href="https://upswot.com/upswot-signs-a-new-multi-year-and-multi-million-dollar-deal-with-envestnet-yodlee/" target="_blank">Envestnet upSWOT</a>
            - <a href="https://newsroom.envestnet.com/2022-10-24-Envestnet-Data-Analytics-Unveils-New-Vision-at-Money-20-20" target="_blank">Envestnet Data & Analytics</a>
        details: |
          **ACE/IMPACT — Data Strategy Recovery, Technical Advisory & Enterprise Observability**

          Recovered a critical cross-enterprise data engineering project (ACE/IMPACT) in three
          weeks of intensive work after the prior owner's departure — touching every product team
          and technology stack in the enterprise. ACE (Automated Custodian Extract) processed
          custodian data from Pershing and Schwab through raw → standardized → curated pipeline
          stages. IMPACT provided market data and ESG data products with an API gateway layer
          serving WDP, Finance, and RevOps consumers. Together they formed the core of
          Envestnet's Data Strategy initiative and were significant precursors to the Unified
          Portfolio Accounting (UPA) system.

          The recovery earned executive sponsorship and established the cross-enterprise access
          and trust that enabled every subsequent initiative. But the contribution went beyond
          infrastructure recovery — served as technical advisor to the engineering team on AWS
          data pipeline implementation, fast-tracking their adoption of Airflow DAGs, EMR jobs,
          S3 data lake patterns, Glue crawlers, Lambda, and Step Functions. These were unfamiliar
          AWS services for the software engineers; prior experience building similar pipelines at
          BCBSNC (where the same Airflow/EMR/S3 patterns powered the CarePath ML framework)
          allowed me to accelerate the team's delivery and shape their architectural decisions
          rather than just provisioning infrastructure underneath them.

          Built the observability framework during the ACE/IMPACT recovery that became a
          company-wide standard: New Relic dashboards provisioned via Terraform with every
          monitored metric linked to a Confluence workbook documenting the metric's meaning,
          expected ranges, response procedures, and escalation paths. This was not just
          monitoring — it was operational documentation as code, giving on-call staff actionable
          runbooks directly from the alerting surface. ACE/IMPACT was the first project to
          incorporate this technique, and the pattern was subsequently adopted across the
          enterprise as the standard for new observability deployments.

          The legacy ACE/IMPACT pipelines (Lambda, Step Functions, EC2-based EMR, DMS —
          deployed via CloudFormation SAM in 2022) continue running in DataLake us-east-1
          under ongoing operational support. Continue maintaining these legacy workloads with
          the Data Strategy team while simultaneously building the replacement platform:
          containerized EMR on EKS in the DataLake us-east-2 clusters. The technology gap
          between the legacy EC2-based EMR (2022 vintage) and the virtual EMR-on-EKS
          implementation (2026) is substantial — moving from standalone EC2 clusters with
          CloudFormation lifecycle management to Spark workloads running as native Kubernetes
          pods with shared compute, Karpenter-managed scaling, and unified observability.
          The EMR-on-EKS implementation is a major milestone in the Data Strategy migration,
          enabling the decommissioning of the legacy us-east-1 infrastructure and completing
          a four-year arc from emergency project recovery to modern containerized platform.

          **Data Lake Initiative — Cross-Enterprise Data Integration (Year 1)**

          Led an organizational influence campaign to extract data from every product group into the
          central data lake — achieving over 90% coverage across the enterprise within the first year.
          Approximately one-third of teams collaborated willingly, one-third required demonstrated
          value from early wins to convert, and one-third required escalation with constructive
          proposals to management. This was not an engineering project — it was an organizational
          influence campaign executed without positional authority, navigating politics and building
          trust across teams with no reporting relationship. Simultaneously served as the dedicated
          SRE resource for the entire EDI portfolio (15+ AWS accounts across four product lines).

          **Unified Portfolio Accounting (UPA)**

          UPA is a portfolio accounting platform using cloud-native technologies for a highly
          scalable service to maintain, balance, adjust, and validate financial data from
          custodian platforms and trusted connections to existing platforms like UMP and Tamarac.
          The system includes EKS with integrations for vEMR (Hadoop), Airflow (MWAA), and
          custom workflows — containerized microservices managed on a service mesh deployed from
          managed CI/CD pipelines with IaC-managed infrastructure.

          Implemented KEDA (Kubernetes Event-Driven Autoscaling) for workload management on the
          UPA EKS clusters — enabling event-driven scaling of processing workloads based on queue
          depth, schedule, and custom metrics rather than static replica counts. This was a major
          piece of the platform build-out that allowed the system to handle variable custodian
          data volumes efficiently.

          Replaced the default AWS VPC CNI with Calico to resolve IP address exhaustion issues
          during large scaling events. The AWS CNI's IP warm pool and refresh rates could not
          keep pace with rapid node scaling — pods would fail to schedule because the CNI
          couldn't allocate IPs fast enough from the VPC subnet. Calico's overlay networking
          eliminated the dependency on VPC IP allocation entirely, decoupling pod networking
          from subnet capacity and enabling the aggressive scaling patterns the platform required.

          Implemented scale-to-zero workload patterns using a split node group architecture:
          spot-instance node groups for worker processes (data engineering and batch workloads)
          managed by a smaller classic EC2 on-demand node group running the orchestration layer.
          This technique was brought directly from BCBSNC where the same pattern was used for
          GPU-enabled spot instance nodes running ML model training — spot for the expensive
          compute, on-demand for the control plane that manages it. Scale-to-zero kept the UPA
          platform within budget by eliminating idle compute costs during off-hours, making the
          infrastructure financially viable on available budgets.

          **Small and Medium Business Portal (SMB Portal)**

          SMB Portal provides a platform to
          empower businesses to make important decisions more easily and take actions based on data. The
          integrated portal includes the apps that most SMBs use to run their businesses and provides greater
          opportunity for growth and partnership between SMBs and banks. The software was implemented with
          cloud-native containerized microservices which was migrated to AWS managed cloud services as part of a
          migration. IaC (Infrastructure as Code) and conversion from on-premise and alternate cloud vendors was a major
          hurdle to implementation and bringing the product to a managed state.

          **Data Science / AI / ML Platform**

          Delivered the first AI/ML production workload on the Billing platform (AWS Bedrock Data
          Automation), evaluating multiple approaches and selecting the winner through POC. Built and
          operated the enterprise SageMaker platform from initial deployment through account migration,
          creating VPC endpoints across all 4 environments for ML inference pipelines. Managed
          IaC-managed SageMaker environments via GitLab, provisioned network access from notebook
          environments to internal services (GitLab, Nexus, Harbor), and operated a dedicated Data
          Science EKS cluster. Multiple internal data science projects using serverless ML
          (Lambda/Step Functions) and SageMaker with container deployment mechanisms.

          **Data Marketplace**

          External vendor web-application with internal compute and storage for a
          data management platform in the financial services space. Integration with the internal system via managed
          processes and managing security concerns were the primary concerns and issues with implementation.

          **EKS Platform Operations & Migrations (2023–2026)**

          Led complex EKS upgrades across multiple platforms (Microservices-Accounting, MDS, UMP,
          Payments, DataLake) through versions 1.28–1.33. The DataLake EKS 1.32 upgrade was the most complex
          to date — navigating aws-auth ConfigMap deprecation, external-dns migration, and
          coordinated Airflow helm chart upgrades requiring custom container image rebuilds.

          **EKS Working Group — Cross-Team Technical Leadership (2022–2024)**

          Founded and led the enterprise EKS Working Group — a bi-weekly cross-team forum
          that brought together Platform Engineering, COE, UMP PRO, TAMPRO, DnA/Yodlee, and
          DevOps teams around shared Kubernetes standards and architecture decisions. Led by
          influence rather than mandate, modeled on the "birds of a feather" sessions from
          RFC and standards work earlier in career: every session had a valuable agenda item
          that gave people a reason to show up.

          Drove enterprise-wide architecture decisions through the working group: Calico CNI
          adoption (replacing AWS VPC CNI), Istio service mesh implementation, ArgoCD
          centralization and Okta integration, KEDA event-driven autoscaling, Karpenter
          adoption, Kubecost implementation, and OPA Gatekeeper policy enforcement. Authored
          technical documentation on each feature area and coordinated EKS version upgrades
          from v1.22 through v1.30+ across the enterprise, managing breaking changes including
          Dockershim removal, PodSecurityPolicy deprecation, and ContainerD migration.

          The working group succeeded in its mission — the enterprise went from fledgling
          Kubernetes knowledge to multiple groups of experts who communicate actively. As the
          community matured and self-organized, the need for the formal working group
          diminished, which was the intended outcome: build the community, transfer the
          knowledge, and let the organization sustain it independently.

          **AWS QuickSight — Revenue Manager BI Platform (2024–2026)**

          Led the full-lifecycle migration of Revenue Manager's BI platform from self-hosted
          Tableau on EC2 to AWS QuickSight — from initial Terraform POC through production
          deployment serving external financial services clients. QuickSight was not a
          well-integrated managed service at the time — Terraform support was incomplete,
          federated authentication was undocumented, and multi-tenant isolation required
          custom tooling that didn't exist. Built the solutions for each gap:

          Implemented Okta SSO federated authentication with Admin/Author/Reader role
          mappings. Built GitLab CI/CD automation for cross-account, cross-region QuickSight
          asset promotion — parameterized deployment pipelines enabling multi-client
          onboarding with namespace-based tenant isolation. Created IP-restricted client
          instances for external access. Designed custom vanity URLs (rmanalytics.redi2.com)
          using the same CloudFront Function redirect pattern later published as a Terraform
          Registry module. Built cost and usage dashboards for internal visibility.

          The migration eliminated hundreds of thousands of dollars annually in Tableau
          licensing costs while gaining tighter integration with the AWS data infrastructure
          (S3, Glue, Athena). The platform now serves multiple environments (Dev/UAT/Prod)
          across regions (us-east-1, eu-west-2 for UK clients).

          In 2026, extending the platform with QuickSight embedded analytics — implementing
          the GenerateEmbedUrlForRegisteredUser API to enable white-label dashboard embedding
          directly into the Revenue Manager product UI (Quick Suite). This required IAM policy
          changes across Dev and Prod, permission model debugging for the embedded context,
          and coordination with the product team on the integration surface. The embedded
          analytics capability transforms QuickSight from a standalone BI tool into a native
          component of the Revenue Manager product experience. Additional 2026 work includes
          Snowflake OAuth connectivity research for expanded data source integration.

          **EMR on EKS — DataLake Modernization (2026)**

          Architecting EMR on EKS infrastructure for DataLake platform modernization — migrating
          legacy provisioned EMR Spark workloads (ACE custodian data normalization, Impact market
          data pipelines) from dedicated EC2-based EMR clusters in us-east-1 to containerized
          virtual clusters on the DataLake EKS platform in us-east-2. Implementing Karpenter-based
          dynamic node scaling with on-demand nodes for Spark drivers and spot instances for
          executors, Airflow-integrated job submission, scoped IAM execution roles with per-stage
          S3 bucket access (landing → raw → standardized → curated), EFS shared storage for EMR
          pods, CloudWatch log groups for Spark job monitoring, and dedicated namespaces with pod
          templates per environment.

          This completes a four-year arc: advised on the original ACE/Impact pipeline
          implementation (2022), provided operational support for the legacy us-east-1 workloads
          (2022–present), upgraded the DataLake EKS clusters through versions 1.29 → 1.31 → 1.32
          → 1.33, and now building the EMR on EKS infrastructure that containerizes the last
          remaining legacy workloads onto the modern platform. The technology distance between
          the 2022 EC2-based EMR (CloudFormation-managed, static cluster sizing, dedicated
          hardware) and the 2026 EMR on EKS (Kubernetes-native Spark, Karpenter spot scaling,
          shared cluster infrastructure, unified observability) represents a full generation of
          data platform architecture.

          **Security Hardening (2025–2026)**

          Enforced IMDSv2 across Payments and SalesOps compute resources, eliminating instance
          metadata v1 attack surface as part of company-wide security hardening. Remediated
          high-severity Wiz CSPM findings across Billing & Payments accounts (KMS excessive
          access, service account privilege issues). Restricted Revenue Manager security groups
          to specific IP ranges, adding defense-in-depth network segmentation. Implemented WAF
          configurations and CrowdStrike Falcon sensor upgrades across EKS clusters.

          **Cost Optimization**

          Cost optimization was a sustained initiative across the tenure, with the largest
          wins coming from the UPA platform architecture decisions described above:
          scale-to-zero with spot-instance worker node groups, KEDA event-driven autoscaling
          replacing static replica counts, and Calico CNI eliminating subnet IP exhaustion
          during scaling events. Additional wins included Cluster Autoscaler fix eliminating
          orphaned EC2 instances that accumulated silently, EKS node right-sizing from
          4xlarge to 2xlarge across all environments, KubeCost implementation for granular
          per-namespace cost visibility, Karpenter migration from Cluster Autoscaler for
          more efficient bin-packing and spot instance management, and decommissioning of
          unused AWS accounts (Neo4J, upSWOT) to reduce account sprawl and costs.

          Migrating legacy RDS clusters and EC2-hosted databases to AWS Aurora Serverless v2
          instances — eliminating the cost of provisioned capacity that sits idle during
          off-peak hours. Built a custom Terraform module to manage the complexity of the
          migration: the module handles both existing RDS clusters and new Aurora Serverless
          clusters under a single interface, validating parameters and enforcing configuration
          consistency as workloads are migrated incrementally. The unified module reduces the
          risk of misconfiguration during migration and provides a repeatable pattern for
          each database workload moved to serverless.

          **SOC 1 & SOC 2 Compliance (2022–2026)**

          Led a four-year progression in SOC compliance scope that culminated in enterprise-wide
          ownership of the compliance initiative:

          *2022–2023 — Ad-hoc Evidence:* Provided SOC evidence as an SME in isolation without full
          audit context, while focused on infrastructure build-out, automation tooling, and extensive
          documentation to shore up gaps left by departing personnel. Security and compliance background
          from NC DOR (IRS SafeGuard) and SAS Institute (FDA CFR Part 11) had not yet been surfaced to
          leadership — the immediate priority was stabilizing infrastructure and consolidating inconsistent
          practices across teams.

          *2024 — First Full Audit:* Primary infrastructure evidence provider for the inaugural Envestnet
          Payments SOC 2 Type 1 audit, completing 25+ compliance tasks covering availability, security,
          change management, data processing, and confidentiality controls. First end-to-end audit
          engagement where the security background became visible to leadership.

          *2025 — Eight Simultaneous Audits + Vendor Transition:* Led infrastructure compliance
          evidence collection for 8 simultaneous SOC 1/SOC 2 Type 2 audits across every platform
          in the portfolio: Revenue Manager, Wealth Manager, BillFin, Payments, Tamarac, UMP,
          ERS, and WDP. Completed 40+ individual evidence tasks. Navigated a mid-cycle audit
          vendor transition — half of the 2025 audits were conducted under the incoming vendor's
          processes and evidence requirements, requiring adaptation to new auditor expectations,
          evidence formatting standards, and communication protocols while maintaining continuity
          across the audits still running under the outgoing vendor. Automated evidence collection
          from multiple sources, replacing manual processes with repeatable tooling that reduced
          preparation effort and improved consistency across product areas. Established
          standardized evidence practices that brought previously inconsistent product teams into
          alignment — a direct result of both the automation and the new operational controls
          introduced during the 2025 cycle. Validated controls and provided direct responses to
          external auditors as the primary technical liaison.

          Served as subject matter expert across multiple audit domains including development
          workflow and SDLC practices, CI/CD pipeline controls, authentication and authorization
          architecture, operating system hardening and configuration management, DevOps
          operational practices, and infrastructure security controls. This breadth of expertise
          — spanning application security, platform engineering, and operational compliance —
          made the role a natural extension of the security and compliance work from earlier
          career positions at NC DOR (IRS SafeGuard) and SAS Institute (FDA CFR Part 11).

          *2026 — Full Vendor Migration + Expanded Scope:* All audits now conducted under the
          new audit vendor with fully adapted processes. Expanding scope to cover all product
          areas with increased leadership over the compliance process, including defining the
          audit preparation timeline, managing auditor relationships, and driving remediation
          of control gaps identified in the 2025 cycle.

      - role: Principal Data & Analytics Platform Engineer
        time: Apr 2019 - Oct 2021
        company: Blue Cross and Blue Shield of NC, Raleigh-Durham NC (Remote)
        summary: |
          Architected and led development of the enterprise data science platform — multi-account
          AWS infrastructure (EKS, EMR, RDS, Lambda), containerized ML execution environment, and
          CI/CD pipelines — powering production deep learning models processing claims data from
          all NC members, emergency rooms, and hospitals under near-real-time requirements.
          Operated with director-equivalent authority: conducted performance reviews, drove salary
          increases, executed performance improvement plans, led hiring, and dotted-line reported
          to the SVP. Managed cost controls across the EKS platform and the team of platform
          engineers building it — spot-instance and GPU-enabled node groups with scale-to-zero
          scheduling, activity-based cost tracking, and remediation workflows for developers and
          data scientists provisioning AWS resources. Delivered the Medicare Guided Selling system
          as a fast-track serverless deployment (Lambda, API Gateway, DynamoDB) to meet an
          SVP-driven timeline before the full platform was ready. Built the CarePath ML framework
          that produced award-winning models for Complex Case Management (ISSIP Excellence in
          Service Innovation Award), Hospital-to-Home transitions, and cardiovascular/diabetes
          risk prediction.
            - <a href="https://www.bluecrossnc.com/medicare-guided-selling-landing-page" target="_blank">Medicare Guided Selling</a>
        details: |
          **Cloud-First Platform (AWS)**

          Built a complete multi-account AWS platform managed via
          CloudFormation stacks from the ground up. All aspects of the platform from VPC to IAM/Policy
          moving towards the higher-level components like shared RDS clusters, EKS clusters, EMR and associated
          dependent services like S3, ACM PCA, EFS with CSI integration to EKS, Route53 integration with
          enterprise Infoblox and other services as necessary were all managed via CloudFormation stacks. This
          had overhead but allowed for a highly consistent and managed cross-account environment working
          together. This implementation included writing Lambda functions and CloudFormation Custom Resources
          for several services when CloudFormation did not offer a mechanism to manage a service completely.

          **Containerized Development (Kubernetes)**

          Implemented local standardized Kubernetes
          development with Docker for Windows/Mac and managed AWS EKS Kubernetes cluster per AWS
          account. Local development initially used docker-compose for deployments to Kubernetes in Docker
          (KinD) with a migration to Helm3 Charts. The EKS deployments were managed with a shared
          cross-account CICD Pipeline giving developers full control over build and deployments. Spot-instance CPU
          & GPU enabled EC2 worker nodes with zero-scaled nodes for GPU to reduce cost allowed for a
          cost-effective execution platform. The EKS managed Kubernetes and associated AWS resources
          (EFS/Route53/ACM/VPC/etc) were all managed via CloudFormation stacks (or scripted configuration
          changes) with synchronized infrastructure deployment environments for development stages. Some of the
          major inclusions for the K8S clusters were helm chart managed External-DNS, Nginx-Ingress with NLB,
          Cluster Autoscaler, Nvidia device plugin, Prometheus with resource metrics, KubeWatch and EFS CSI
          drivers. K8S Service Account (KSA) permissions via AWS IAM Role/Policy at the container level rather
          than node level offered additional security for managed access to AWS resources. Extensions using AWS
          Fargate container execution are enabled in a non-HIPAA environment while working out compliance
          requirements.

          **Medicare Guided Selling Tool (MGS)**

          Delivered as a fast-track project to meet an SVP-driven timeline — the AWS platform was
          not yet ready for general use, so I designed and shipped a complete serverless system in
          weeks. Built a fully integrated Serverless Framework (SLS) implementation using AWS
          API Gateway backed with Lambda functions in Python3, providing a REST API for WebUI
          developers pulling content from a DAX/DynamoDB datastore populated by a custom
          containerized event-driven ETL process. This public-facing production system went live
          in June 2019 and served NC Medicare members through 3Q2021. The rapid delivery
          demonstrated the ability to ship production systems under executive pressure while the
          broader platform was still being built — and positioned me as both infrastructure
          architect and first consumer of the platform services the team provided to the enterprise.

          **Drug Lookup and Calculation (DLC)**

          The DLC project was an investigation into a standard
          enterprise-wide REST API that would allow for fast drug lookups via sub-strings for ease of search in a
          web-ui, validation of drug information with parameters, and cost calculations when member details were
          available to map against plan benefits. The pilot REST API was implemented rapidly as part of the MGST
          for 2Q2021 deliverables and then made available across the enterprise as the value was broadly recognized.

          **CarePath (Machine Learning) Models**

          CarePath is a software framework developed by Blue
          Cross NC that acts as a deep learning model factory. It constructs state-of-the-art deep neural networks
          which learn and then recognize the patterns in sequences of claims which eventually lead to particular
          health events. This enables Blue Cross to accurately identify members at risk for a wide range of
          preventable events.

          We used this in-house general framework to build specific health related models to identify member level
          risks and possible health impact to focus our care management programs on those members at greatest risk
          and improve their health outcomes. Production examples of this include:
          * Complex Case Management (CCM) models for predicting both potential hospital initial admissions
          and separate readmissions after care using claims and other historical data to target members at
          risk with the goal of improving health outcomes. These two models have had a measurable impact
          on member health.
          * Hospital to Home (H2H) model to identify members at high risk for readmission who need
