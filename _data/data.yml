      - title: gs1-gpc — Published Python Library for GS1 Global Product Classification
        link: https://github.com/mcgarrah/gs1_gpc_python
        tagline: >
          A Python library and CLI for importing GS1 Global Product Classification (GPC) taxonomy
          data into SQLite or PostgreSQL. Corrects the many-to-many relationship modeling between
          bricks and attribute types that other implementations get wrong — using junction tables
          instead of single foreign keys that silently lose data. Supports downloading the latest
          GPC XML from GS1, SQL export for migration, and serves as the data layer for the
          Nutrition API project. Published to PyPI with automated CI/CD and Read the Docs.
           - code: [https://github.com/mcgarrah/gs1_gpc_python](https://github.com/mcgarrah/gs1_gpc_python){:target="_blank"}
           - pypi: [PyPI](https://pypi.org/project/gs1-gpc/){:target="_blank"}
           - docs: [Read the Docs](https://gs1-gpc.readthedocs.io/){:target="_blank"}

      - title: usda-fdc — Published Python Library for USDA Food Data Central API
        link: https://github.com/mcgarrah/usda_fdc_python
        tagline: >
          A comprehensive Python client for the USDA Food Data Central API with object-oriented
          data models, nutrient analysis with dietary reference intake comparisons, recipe analysis
          with ingredient parsing, and Django integration for local database caching. Includes a
          CLI for quick data access and an analysis tool for nutrient comparison and HTML report
          generation. Published to PyPI with Read the Docs documentation.
           - code: [https://github.com/mcgarrah/usda_fdc_python](https://github.com/mcgarrah/usda_fdc_python){:target="_blank"}
           - pypi: [PyPI](https://pypi.org/project/usda-fdc/){:target="_blank"}
           - docs: [Read the Docs](https://usda-fdc.readthedocs.io/){:target="_blank"}

      - title: git-timesheet — Published Python CLI for Git-Based Time Tracking
        link: https://github.com/mcgarrah/git_timesheet_python
        tagline: >
          A Python CLI tool that generates timesheets from git commit history — leveraging
          timestamps already embedded in your workflow instead of requiring manual time tracking.
          Supports multiple repositories, configurable work session gap detection, and output
          in multiple formats. Built to solve a real problem tracking hours across multi-repo
          freelance projects. Published to PyPI with Read the Docs documentation.
           - code: [https://github.com/mcgarrah/git_timesheet_python](https://github.com/mcgarrah/git_timesheet_python){:target="_blank"}
           - pypi: [PyPI](https://pypi.org/project/git-timesheet/){:target="_blank"}
           - docs: [Read the Docs](https://git-timesheet.readthedocs.io/){:target="_blank"}
           - article: [Introduction](https://mcgarrah.org/generate-git-timesheets-python-module/){:target="_blank"}

      - title: Certification Timed Multiple Choice Quiz WebApp (Full Stack Development)
        link: https://github.com/mcgarrah/legendary_quick_quiz
        tagline: >
          This application is a fully-fledged, dynamic quiz platform built on the lightweight Flask 
          web framework for Python. The code demonstrates both front-end and back-end development 
          using modern tools such as Bootstrap5 and dynamic rendering in the pages. Forgive me if
          the demo site is down... free tier hosting.
           - code: [https://github.com/mcgarrah/legendary_quick_quiz](https://github.com/mcgarrah/legendary_quick_quiz){:target="_blank"}
           - demo: [Demo Website](https://quiz.mcgarrah.org/){:target="_blank"}

      - title: AWS QuickSight Federated Integration (Terraform Automation)
        link: https://github.com/mcgarrah/quicksight_demo
        tagline: >
          Terraform automation for AWS QuickSight federated integration — converting scattered
          AWS blog posts and CloudFormation examples into reproducible Terraform configurations.
          Covers Okta SSO federation, IAM role mappings, namespace-based multi-tenant isolation,
          and Python Lambda layers for QuickSight API automation. Built as a reference
          implementation alongside the enterprise QuickSight migration at Envestnet, where the
          same patterns were applied to production deployments serving external financial
          services clients. Companion to the QuickSight Vanity URL Redirect module (above)
          which handles the custom domain routing layer.
           - code: [https://github.com/mcgarrah/quicksight_demo](https://github.com/mcgarrah/quicksight_demo){:target="_blank"}

      - title: Photosynth Point Clouds Extraction and Visualization (2016)
        link: https://youtu.be/WZPtuNnaqVc
        tagline: >
          Extraction and visualization of point cloud data from the Microsoft Photosynth web service.
          Exporting the data into common formats for further analysis and processing.
          This Computational Photography project demonstrates building 3D models from a series of 2D photographs.
           - code: [PyPhotoSynthExport](https://github.com/mcgarrah/PyPhotoSynthExport){:target="_blank"}
           - video: [Presentation](https://youtu.be/WZPtuNnaqVc){:target="_blank"}

      - title: Artificial Intelligence for Robotics (2015)
        link: https://goo.gl/QmKfW3
        tagline: >
          The goal for the final project in CS6475 AI for Robotics was to create a robotic platform to investigate 
          computer vision technology. The platform included an Arduino with sensors and motors and a Raspberry Pi 2 
          for the vision and primary control system. A remote control web-ui was included as a cool extra for demoing
          to graders. The project URL is a video channel that shows the progress and challenges.
           - video: [Presentation](https://goo.gl/QmKfW3){:target="_blank"}

      - title: “Senior Design - NetApp iSCSI with RDMA/TOE” (Fall 2010 Capstone Project)
        link: https://sdc.csc.ncsu.edu/projects/2010/fall#3
        tagline: >
          Develop a methodology for 10Gbps iSCSI that utilized RDMA and TOE to reduce primary CPU and 
          memory usage. Document and managed the project as a team leader. The resulting iSER implementation 
          was utilized in a related NetApp Phd project at the University of Bangalore India.

      - title: “Ecommerce & J2EE - Kodak Image Mapping (similar to Google Maps)” (Fall 2001 Graduate Class)
        tagline: >
          A web application similar to Google Maps but five years earlier and allowed for monetizing the 
          service. Interviewed customer and defined specifications for and delivered a prototype web 
          service for an online map delivery system. Service allowed for customers to purchase and 
          schedule aerial imaging via aircraft or satellite imaging at varied resolutions.

