
{% assign certifications = site.data.data.certifications %}
{% if certifications %}
<section class="section certifications-section">
  <h2 class="section-title">{{ certifications.title }}</h2>

  <div class="cert-list">
  {% for cert in certifications.list %}
  <div class="cert-row">
    <span class="cert-name">{{ cert.name }}</span>
    <span class="cert-sep">•</span>
    <span class="cert-org-inline">{{ cert.organization }}</span>
    <span class="cert-sep">•</span>
    <span class="cert-date">{{ cert.start }}{% if cert.end %} – {{ cert.end }}{% endif %}</span>
  </div>
  {% endfor %}
  </div>
</section>
{% endif %}
