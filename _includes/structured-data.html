{% assign d = site.data.data %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ d.sidebar.name }}",
  "givenName": "Michael",
  "familyName": "McGarrah",
  "additionalName": "James Michael",
  "alternateName": ["James Michael McGarrah", "James McGarrah"],
  "jobTitle": "{{ d.sidebar.tagline }}",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "email": "mailto:{{ d.sidebar.email }}",
  "telephone": "{{ d.sidebar.phone }}",
  "image": "{{ site.url }}{{ site.baseurl }}/assets/images/{{ d.sidebar.avatar }}",
  "sameAs": [
    "https://www.linkedin.com/in/{{ d.sidebar.linkedin }}",
    "https://github.com/{{ d.sidebar.github }}",
    "https://gitlab.com/{{ d.sidebar.gitlab }}",
    "https://www.kaggle.com/{{ d.sidebar.kaggle }}",
    "https://stackoverflow.com/users/{{ d.sidebar.stack-overflow }}",
    "https://signal.me/#p/{{ d.sidebar.signal }}",
    "https://discord.com/users/{{ d.sidebar.discord }}",
    "https://{{ d.sidebar.website }}"
  ],
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "US"
  },
  "nationality": {
    "@type": "Country",
    "name": "United States"
  },
  "knowsLanguage": [{% for lang in d.sidebar.languages.info %}
    {
      "@type": "Language",
      "name": "{{ lang.idiom }}"
    }{% unless forloop.last %},{% endunless %}{% endfor %}
  ],
  "description": "{{ d.career-profile.summary | strip_newlines | replace: '"', '\"' | truncate: 500 }}",
  "alumniOf": [{% for edu in d.education.info %}
    {
      "@type": "EducationalOrganization",
      "name": "{{ edu.university }}"
    }{% unless forloop.last %},{% endunless %}{% endfor %}
  ],
  "hasCredential": [{% for cert in d.certifications.list %}
    {
      "@type": "EducationalOccupationalCredential",
      "name": "{{ cert.name }}",
      "credentialCategory": "Professional Certification",
      "recognizedBy": {
        "@type": "Organization",
        "name": "{{ cert.organization }}"
      }{% if cert.credentialurl %},
      "url": "{{ cert.credentialurl }}"{% endif %}{% if cert.start %},
      "dateCreated": "{{ cert.start }}"{% endif %}
    }{% unless forloop.last %},{% endunless %}{% endfor %}
  ],
  "worksFor": {
    "@type": "Organization",
    "name": "{{ d.experiences.info[0].company | split: ',' | first }}"
  },
  "hasOccupation": [{% for job in d.experiences.info %}
    {
      "@type": "Occupation",
      "name": "{{ job.role }}",
      "occupationLocation": {
        "@type": "Country",
        "name": "US"
      },
      "description": "{{ job.summary | strip_newlines | replace: '"', '\"' | truncate: 300 }}"
    }{% unless forloop.last %},{% endunless %}{% endfor %}
  ]
}
</script>
