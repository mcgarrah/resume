<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }} — Machine-Readable</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}/machine/">

  {% seo %}

  {% include structured-data.html %}

  <style>
    /* Minimal styling for human readability — this view is optimized for machines */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1.2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.25rem; margin-top: 1.5rem; }
    h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    time { color: #666; font-size: 0.9em; }
    a { color: #1a5276; }
    ul { padding-left: 1.5rem; }
    .meta { color: #666; font-size: 0.9em; }
    section { margin-bottom: 1.5rem; }
    article { margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #eee; }
    article:last-child { border-bottom: none; }
  </style>
</head>

<body>
  {{ content }}
</body>
</html>
