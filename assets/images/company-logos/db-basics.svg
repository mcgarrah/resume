<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Database cylinder icon for DB Basics, Inc. -->
  <!-- Classic flowchart database/data store symbol -->
  <!-- Cylinder body -->
  <rect x="50" y="55" width="100" height="100" fill="#E8A838" stroke="#8B6914" stroke-width="2"/>
  <!-- Top ellipse (lid) -->
  <ellipse cx="100" cy="55" rx="50" ry="20" fill="#F0C050" stroke="#8B6914" stroke-width="2"/>
  <!-- Bottom ellipse (base) -->
  <ellipse cx="100" cy="155" rx="50" ry="20" fill="#D49828" stroke="#8B6914" stroke-width="2"/>
  <!-- Middle decorative ellipse lines -->
  <ellipse cx="100" cy="88" rx="50" ry="15" fill="none" stroke="#8B6914" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="121" rx="50" ry="15" fill="none" stroke="#8B6914" stroke-width="1.5" opacity="0.6"/>
  <!-- Highlight on top -->
  <ellipse cx="85" cy="50" rx="20" ry="8" fill="rgba(255,255,255,0.25)" transform="rotate(-5 85 50)"/>
</svg>
